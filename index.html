<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TahMat - Sayı Bulmaca</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Fredoka', sans-serif; }</style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen">
    <div id="app"></div>
    <script>
        let state = {
            digits: 4, targetNumber: '', attempts: 0, 
            gameStarted: false, gameComplete: false, guessHistory: []
        };

        function startGame() {
            let digits = [];
            while(digits.length < state.digits) {
                let r = Math.floor(Math.random() * 10);
                if(digits.length === 0 && r === 0) continue; 
                if(!digits.includes(r)) digits.push(r);
            }
            state.targetNumber = digits.join('');
            state.attempts = 0; state.gameStarted = true;
            state.gameComplete = false; state.guessHistory = [];
            render();
        }

        function submitGuess() {
            const input = document.getElementById('guessInput');
            const guess = input.value;
            if (guess.length != state.digits || isNaN(guess)) return;
            state.attempts++;
            let plus = 0, minus = 0;
            let targetArr = state.targetNumber.split('');
            guess.split('').forEach(char => {
                if (targetArr.includes(char)) plus++;
                else minus++;
            });
            state.guessHistory.unshift({ guess, plus, minus });
            if (guess === state.targetNumber || state.attempts >= 15) state.gameComplete = true;
            render();
        }

        function render() {
            const app = document.getElementById('app');
            let html = `<nav class="p-4 border-b flex justify-between items-center bg-white dark:bg-slate-900 shadow-sm">
                <h1 class="text-xl font-bold text-indigo-600">TahMat</h1>
                <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 bg-slate-100 dark:bg-slate-800 rounded">🌓</button>
            </nav>`;

            if (!state.gameStarted) {
                html += `<div class="max-w-md mx-auto mt-20 p-8 bg-white dark:bg-slate-900 rounded-3xl shadow-xl text-center border dark:border-slate-800">
                    <h2 class="text-3xl font-bold mb-6">Ayarlar</h2>
                    <p class="mb-4 text-sm opacity-60">Kaç basamaklı olsun?</p>
                    <div class="mb-8 flex justify-center gap-2">
                        ${[3,4,5,6].map(n => `<button onclick="state.digits=${n};render()" class="w-12 h-12 rounded-xl border-2 ${state.digits===n ? 'border-indigo-600 bg-indigo-50 dark:bg-indigo-900/30' : 'border-slate-200 dark:border-slate-700'}">${n}</button>`).join('')}
                    </div>
                    <button onclick="startGame()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold text-xl hover:scale-105 transition-transform shadow-lg shadow-indigo-500/30">OYUNU BAŞLAT</button>
                </div>`;
            } else {
                html += `<div class="max-w-md mx-auto p-4 mt-6">
                    <div class="bg-white dark:bg-slate-900 p-6 rounded-3xl shadow-lg border dark:border-slate-800 mb-6 text-center">
                        ${!state.gameComplete ? `
                            <p class="mb-4 font-bold text-indigo-600 uppercase tracking-widest text-sm">Tahminini Yaz</p>
                            <input type="text" id="guessInput" maxlength="${state.digits}" class="w-full text-center text-4xl p-4 rounded-xl border-2 dark:bg-slate-950 dark:border-slate-800 mb-4 font-mono tracking-widest focus:border-indigo-600 outline-none" placeholder="${'•'.repeat(state.digits)}">
                            <button onclick="submitGuess()" class="w-full py-4 bg-indigo-600 text-white rounded-xl font-bold text-lg">TAHMİN ET</button>
                        ` : `
                            <div class="animate-bounce text-4xl mb-4">🎉</div>
                            <h3 class="text-2xl font-bold mb-2">${state.guessHistory[0].guess === state.targetNumber ? 'Tebrikler!' : 'Oyun Bitti!'}</h3>
                            <p class="text-lg mb-6">Gizli Sayı: <span class="font-bold text-indigo-600 text-2xl tracking-tighter">${state.targetNumber}</span></p>
                            <button onclick="state.gameStarted=false;render()" class="w-full py-3 bg-slate-900 dark:bg-white text-white dark:text-slate-900 rounded-xl font-bold">YENİ OYUN</button>
                        `}
                    </div>
                    <div class="space-y-2">
                        ${state.guessHistory.map(h => `
                            <div class="p-4 bg-white dark:bg-slate-900 rounded-xl border dark:border-slate-800 flex justify-between items-center shadow-sm">
                                <span class="font-mono font-bold text-2xl">${h.guess}</span>
                                <div class="flex gap-2">
                                    <span class="bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400 px-3 py-1 rounded-lg font-bold text-sm underline decoration-2">VAR: ${h.plus}</span>
                                    <span class="bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-400 px-3 py-1 rounded-lg font-bold text-sm">YOK: ${h.minus}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
            }
            app.innerHTML = html;
            const input = document.getElementById('guessInput');
            if(input) {
                input.focus();
                input.addEventListener('keypress', (e) => { if(e.key === 'Enter') submitGuess(); });
            }
        }
        render();
    </script>
</body>
</html>
